services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - bookvote_data:/data
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  bookvote_data:
  caddy_data:
  caddy_config:
