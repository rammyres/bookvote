services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - bookvote_data:/data
    # Bound to loopback only: reachable from nginx on the same host, not
    # directly from the internet. nginx is the public-facing TLS terminator.
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  bookvote_data:
