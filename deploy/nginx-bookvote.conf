# Exemplo de server block para o nginx que já está instalado na VM.
#
# Copie para /etc/nginx/sites-available/bookvote, ajuste o server_name,
# depois:
#   sudo ln -s /etc/nginx/sites-available/bookvote /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Se você já usa certbot para outros sites nessa VM, rode em seguida:
#   sudo certbot --nginx -d enquete.seudominio.com.br
# O certbot reescreve este arquivo adicionando o bloco :443 com TLS
# automaticamente — não precisa criar o bloco HTTPS manualmente.

server {
    listen 80;
    listen [::]:80;
    server_name enquete.seudominio.com.br;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        # X-Forwarded-For encadeado (suporta múltiplos proxies na frente,
        # se algum dia houver) — o app lê este cabeçalho para identificar
        # o IP de quem vota/indica, então ele precisa estar correto.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        # Deixa o app saber que a conexão original era HTTPS (importante
        # depois que o certbot adicionar o bloco :443 acima).
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
